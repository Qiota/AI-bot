<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в консоль</title>
    <style>
        :root {
            --color1: #ea529f; /* Розовый */
            --color2: #ef9165; /* Персиковый */
            --color3: #eac748; /* Желтый */
            --color4: #f1e87c; /* Светло-желтый */
            --color5: #c6efc5; /* Светло-зеленый */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, var(--color5), #f5f5f5);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-container {
            background: #fff;
            padding: min(5vw, 2rem);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: min(90vw, 350px);
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: var(--color1);
            font-size: min(7vw, 1.8rem);
            margin-bottom: 1.5rem;
        }

        input[type="password"] {
            width: 100%;
            padding: min(3vw, 0.8rem);
            margin: 0.8rem 0;
            background: #f9f9f9;
            color: #333;
            border: 2px solid var(--color4);
            border-radius: 5px;
            font-size: min(4vw, 1rem);
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--color2);
        }

        button {
            width: 100%;
            padding: min(3vw, 0.8rem);
            background: var(--color3);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: min(4vw, 1rem);
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background: var(--color2);
            transform: scale(1.05);
        }

        .error {
            color: #e57373;
            font-size: min(3.5vw, 0.9rem);
            margin-top: 0.8rem;
        }

        @media (max-width: 600px) {
            .login-container {
                width: 95vw;
                padding: 1.5rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            input[type="password"],
            button {
                font-size: 0.9rem;
                padding: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Вход в консоль</h2>
        <form method="POST">
            <input type="password" name="password" placeholder="Введите пароль" required>
            <button type="submit">Войти</button>
        </form>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
